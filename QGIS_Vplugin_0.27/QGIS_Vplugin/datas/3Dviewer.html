<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>3D Map</title>
</head>
<body>
<script>
    const params = new URLSearchParams(window.location.search);

    let nowX = params.get('x');
    let nowY = params.get('y');

    document.write(nowX + ' ' + nowY + '<br>');

</script>
</body>
</html>
